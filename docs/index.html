<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vejez sobre Niñez</title>

    <link
      rel="icon"
      type="image/png"
      href="./assets/Vejez_sobre_Niñez_icono.png"
    />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <link rel="stylesheet" href="./css/style.css" />
    <script src="./js/main.js" defer></script>
  </head>
  <body>
    <h2>
      Evolución poblacional dependiente en Chile
      <img
        src="./assets/Bandera_chilena.png"
        alt="Bandera de Chile"
        style="width: 24px; vertical-align: middle"
      />
    </h2>
    <!-- Contenedor para botones de control -->
    <div style="text-align: center; margin-bottom: 20px; display: flex; justify-content: center; gap: 10px;">
      <button id="btnReproducir" class="btn-play">
        ▶ Escuchar Evolución Poblacional
      </button>

      <button id="btnPausa" class="btn-play" disabled style="background-color: #1f2124;">
        ⏸ Pausar
      </button>
    </div>

    <div
      style="
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        align-items: center;
        align-content: center;
        max-width: 95vw;
        margin: 0 auto;
        padding: 0 20px;
      "
    >
      <div
        class="chart-container"
        style="position: relative; padding: 0; flex: 3; width: 900px;"
      >
        <canvas id="miGrafico"></canvas>

        <div
          id="contenedorPastel"
          style="
            display: none;
            position: absolute;
            top: 20px;
            left: 80px;
            width: 200px;
            padding: 15px;
            background: #0b1120;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            text-align: center;
            z-index: 10;
          "
        >
          <h3
            id="tituloPastel"
            style="
              color: #cbd5e1;
              margin-top: 0;
              margin-bottom: 10px;
              font-size: 14px;
            "
          ></h3>

          <canvas id="miGraficoPastel"></canvas>

          <button
            onclick="
              document.getElementById('contenedorPastel').style.display = 'none'
            "
            style="
              margin-top: 15px;
              padding: 6px 12px;
              font-size: 12px;
              background-color: #747d8a;
              color: white;
              border: none;
              border-radius: 4px;
              cursor: pointer;
              width: 100%;
              transition: background 0.2s;
            "
          >
            Ocultar
          </button>
        </div>
      </div>

      <div
        style="
          flex: 1;
          min-width: 250px;
          background: rgba(15, 23, 42, 0.3);
          border: 1px solid rgba(255, 255, 255, 0.1);
          border-radius: 8px;
          padding: 15px;
          display: flex;
          flex-direction: column;
          height: 450px;
        "
      >
        <h3
          id="tituloBarra"
          style="
            color: #cbd5e1;
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 14px;
            text-align: center;
          "
        >
          Población al Hover
        </h3>

        <div style="position: relative; flex-grow: 1; width:300px; align-self: center">
          <canvas id="miGraficoBarra"></canvas>
        </div>
      </div>
    </div>

    <p class="fuente-datos" style="text-align: center; margin-top: 20px">
      Fuente: Instituto Nacional de Estadísticas (INE)
    </p>
  </body>
</html>
