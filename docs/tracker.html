<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tracker Calibrado</title>
    <style>
      body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; color: white;}
      #ui-layer { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; z-index: 100; max-width: 320px; }
      button { background: #36A2EB; color: white; border: none; padding: 10px 12px; margin: 5px 0; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; font-size: 13px;}
      button:disabled { background: #555; cursor: not-allowed; color: #d8d8d8;}
      .status { color: #00ff00; font-family: monospace; font-size: 14px; background: #111; padding: 10px; border-radius: 4px;}
    </style>
  </head>
  <body>
    
    <div id="ui-layer">
      <div id="controles-calibracion">
        <h3 style="margin-top:0; margin-bottom: 5px;">Calibración de la Balanza</h3>
        <p style="font-size: 12px; color: #cbd5e1; margin-bottom: 15px;">Asegúrate de que ambos ArUcos se vean en la cámara. (ID 0: Jóvenes, ID 1: Mayores)</p>
        
        <button id="btnPasado" onclick="calibrarPasado()">1. Sube al Joven al tope y presiona</button>
        <button id="btnFuturo" onclick="calibrarFuturo()">2. Sube al Viejo al tope y presiona</button>
        <button id="btnIniciar" onclick="iniciarTracking()" disabled style="background: #10b981; margin-top: 15px; margin-bottom: 15px;">3. ¡Iniciar Interacción!</button>
      </div>
      
      <div class="status" id="panelDebug">Cargando cámara...</div>
    </div>

    <script src="https://app.protobject.com/framework/p.js"></script>
    <script src="./js/config.js"></script>
    <script>
      Protobject.Aruco.start(30, 0); 
      Protobject.Aruco.showPreview({ top: 0, left: 0, width: 640, height: 480 });

      const ID_JOVENES = 0;
      const ID_MAYORES = 1;
      
      let diffPasado = null; 
      let diffFuturo = null; 
      let calibrado = false;
      let diffSuavizada = 0; 
      
      // NUEVO: Variable para guardar la longitud virtual de la cuerda
      let sumaY_cuerda = null; 

      function calibrarPasado() {
        diffPasado = diffSuavizada;
        document.getElementById("btnPasado").innerText = `✓ Tope Pasado fijado (${diffPasado.toFixed(2)})`;
        document.getElementById("btnPasado").style.background = "#059669";
        verificarInicio();
      }

      function calibrarFuturo() {
        diffFuturo = diffSuavizada;
        document.getElementById("btnFuturo").innerText = `✓ Tope Futuro fijado (${diffFuturo.toFixed(2)})`;
        document.getElementById("btnFuturo").style.background = "#059669";
        verificarInicio();
      }

      function verificarInicio() {
        if(diffPasado !== null && diffFuturo !== null) {
          document.getElementById("btnIniciar").disabled = false;
        }
      }

      function iniciarTracking() {
        calibrado = true;
        document.getElementById("controles-calibracion").style.display = "none";
      }

      Protobject.Aruco.onData((data) => {
        const panel = document.getElementById("panelDebug");
        
        let yJovenes = null;
        let yMayores = null;
        let infoCamara = "";

        // 1. LÓGICA ANTI-OCLUSIÓN (Cuerda Virtual)
        if (data[ID_JOVENES] && data[ID_MAYORES]) {
            // Vemos ambos: Actualizamos sus posiciones y calibramos la longitud de la cuerda
            yJovenes = data[ID_JOVENES].position.y;
            yMayores = data[ID_MAYORES].position.y;
            sumaY_cuerda = yJovenes + yMayores; 
            infoCamara = "🟢 Ambos Detectados";

        } else if (data[ID_JOVENES] && sumaY_cuerda !== null) {
            // Solo vemos al Joven: Calculamos la posición "fantasma" del Mayor
            yJovenes = data[ID_JOVENES].position.y;
            yMayores = sumaY_cuerda - yJovenes; 
            infoCamara = "🟡 Solo ID 0 (Infiriendo ID 1)";

        } else if (data[ID_MAYORES] && sumaY_cuerda !== null) {
            // Solo vemos al Mayor: Calculamos la posición "fantasma" del Joven
            yMayores = data[ID_MAYORES].position.y;
            yJovenes = sumaY_cuerda - yMayores;
            infoCamara = "🟡 Solo ID 1 (Infiriendo ID 0)";
        }

        // 2. MATEMÁTICA Y TRANSMISIÓN (Solo se ejecuta si tenemos posiciones válidas o inferidas)
        if (yJovenes !== null && yMayores !== null) {
          
          let diffCruda = yJovenes - yMayores;

          if (diffSuavizada === 0) {
              diffSuavizada = diffCruda;
          } else {
              diffSuavizada = (diffCruda * 0.10) + (diffSuavizada * 0.90);
          }

          if(!calibrado) {
             panel.innerHTML = `${infoCamara}<br>Δy estable: ${diffSuavizada.toFixed(2)}`;
          } else {
             let posicionNormalizada = 0;

             if (diffSuavizada <= 0) {
                const limite = Math.min(-0.01, diffPasado); 
                posicionNormalizada = Math.max(-1, (diffSuavizada / limite) * -1); 
             } else {
                const limite = Math.max(0.01, diffFuturo); 
                posicionNormalizada = Math.min(1, diffSuavizada / limite);
             }

             posicionNormalizada = Math.round(posicionNormalizada * 100) / 100;

             panel.innerHTML = `${infoCamara}<br>Transmitiendo: ${posicionNormalizada}`;
             Protobject.Core.send({ position: posicionNormalizada }).to('index.html');
          }
        } else {
          // Si no ve NINGUNO, o si recién abrimos y aún no calibramos la cuerda
          diffSuavizada = 0; 
          panel.innerHTML = calibrado ? "⚠️ Esperando al menos 1 marcador..." : "🔴 Pon ambos cartones en cámara para iniciar";
        }
      });
    </script>
  </body>
</html>
